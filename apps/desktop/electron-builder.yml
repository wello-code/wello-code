# Installer packaging. Deliberately runs over an ALREADY-STAGED app directory
# (`electron-builder --prepackaged release/WelloCode-win-x64`) instead of letting
# electron-builder assemble the app itself.
#
# Why: the agent SDK's Windows binary is an optional platform package that pnpm
# links as a SIBLING in the store rather than under the SDK's own node_modules, so
# electron-builder's dependency walk does not find it and would ship a build that
# cannot start the engine. scripts/package-win.mjs resolves it explicitly (and
# stages only what is actually needed: out/, skills-bundle/, resources/ and the
# SDK). That script also stamps the .exe icon and version strings via rcedit,
# which --prepackaged skips.
#
# asar is intentionally absent: the SDK spawns claude.exe straight off disk, and a
# packed archive means either asarUnpack gymnastics or a binary that cannot be
# executed. The tree stays loose, exactly as the portable build has always shipped.

appId: dev.wello.code
productName: Wello Code
copyright: Copyright 2026 Wello. Apache License 2.0.

# MUST stay off. The agent SDK spawns its binary straight off disk, and inside an
# asar archive there is no file to execute. Windows never hit the default because
# --prepackaged skips packing entirely; the macOS target packs for real, so the
# default (true) would have shipped a build that cannot start the engine.
asar: false

directories:
  buildResources: build
  output: release/installer

# An allowlist, mirroring exactly what package-win.mjs stages — which is the set we
# know runs. Without it electron-builder packs the whole app directory, and in a
# pnpm workspace that means walking a forest of symlinks into every devDependency
# (Playwright, Vite, electron-builder itself). With asar off that is a great deal
# of copying for a payload that has no business shipping.
#
# The renderer's own dependencies (React, highlight.js, react-markdown) are absent
# on purpose: electron-vite already bundled them into out/. The agent SDK is the
# one dependency that cannot be bundled, because it spawns a binary off disk.
files:
  - out/**/*
  - skills-bundle/**/*
  - resources/**/*
  - package.json
  - node_modules/@anthropic-ai/**/*

win:
  icon: build/icon.ico
  target:
    - nsis

# macOS is packed by electron-builder itself, unlike Windows: renaming an .app is
# not a rename but surgery (Info.plist, the executable, four helper bundles, the
# icon, then a re-sign), and getting that wrong yields a bundle that will not
# launch. The platform binary it needs is declared as an optionalDependency of this
# package, so pnpm installs it on an arm64 runner and skips it everywhere else,
# which is what makes the normal dependency walk work here.
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  # Ad-hoc signature. NOT cosmetic: since 2020 Apple Silicon refuses to execute
  # unsigned arm64 code at all, so without this the app simply would not start.
  # It needs no certificate and no Apple account. Gatekeeper still asks the user
  # to confirm the first launch of a downloaded build — only notarisation removes
  # that, and notarisation needs the paid programme.
  identity: "-"
  # Ad-hoc + the hardened runtime (electron-builder's default) is a known crash:
  # library validation rejects the ad-hoc-signed frameworks and the app dies on
  # launch. Off until there is a real Developer ID to sign with.
  hardenedRuntime: false
  # Default naming yields "Wello Code-0.1.0-arm64.dmg" — spaces and all — which
  # becomes %20 in every download link we publish. Match the Windows convention
  # instead. (Set here, not at the top level: the Windows artifact name is already
  # published under v0.1.0 and must not move.)
  artifactName: WelloCode-${version}-${arch}.${ext}
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]

nsis:
  # A wizard, not a one-click surprise install: people downloading an unsigned
  # binary have just clicked through a SmartScreen warning, so hiding the
  # destination folder from them is the wrong instinct.
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Wello Code
  artifactName: WelloCode-Setup-${version}.${ext}
  # Leave the user's projects and settings alone when uninstalling; wello-state.json
  # holds their whole task history.
  deleteAppDataOnUninstall: false

# Feeds the auto-updater: publishing to GitHub Releases produces latest.yml plus a
# .blockmap next to the installer, which is what lets electron-updater download only
# the changed blocks (our own code is ~2 MB of a ~190 MB artifact).
publish:
  provider: github
  owner: wello-code
  repo: wello-code
